name: Crawl News

on:
  schedule:
    - cron: "0 23,5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Download source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install crawler packages
        working-directory: crawler
        run: npm install

      - name: Run FoodXplore crawler
        working-directory: crawler
        run: npm run start
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Add missing article images
        working-directory: crawler
        run: npm run repair
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache VietAI translation model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: vietai-envit5-translation-v1

      - name: Install translation packages
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "transformers<5" sentencepiece requests langdetect

      - name: Translate English articles to Vietnamese
        working-directory: crawler
        run: python translate_local.py
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
