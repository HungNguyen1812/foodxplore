<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodXplore — Discover what shapes food</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #fafaf9;
  --bg-secondary: #f5f5f4;
  --bg-card: #ffffff;
  --color-forest: #15803d;
  --color-forest-light: #6ee7b7;
  --color-forest-bright: #4ade80;
  --color-forest-mid: #34d399;
  --color-amber: #ea580c;
  --color-red-hot: #dc2626;
  --text-primary: #0a0a0a;
  --text-secondary: #525252;
  --text-muted: #a3a3a3;
  --border: #e5e5e5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  --sidebar-width: 200px;
  --right-width: 300px;
}

[data-theme="dark"] {
  --bg-primary: #0a0a0a;
  --bg-secondary: #171717;
  --bg-card: #171717;
  --color-forest: #4ade80;
  --color-forest-light: #86efac;
  --color-forest-bright: #4ade80;
  --color-forest-mid: #34d399;
  --color-amber: #fb923c;
  --color-red-hot: #f87171;
  --text-primary: #fafafa;
  --text-secondary: #d4d4d4;
  --text-muted: #737373;
  --border: #262626;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv02','cv03','cv04','cv11';
  min-height: 100vh;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }

/* ══════════════════════════════════════════════════════
   TOPBAR
   ══════════════════════════════════════════════════════ */
.topbar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.topbar-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.brand-logo {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--color-forest-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .brand-logo { background: var(--color-forest-bright); }
.brand-logo svg {
  width: 24px;
  height: 24px;
  color: #0a0a0a;
  fill: #0a0a0a;
}
.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.brand-name {
  font-family: var(--font-sans);
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.025em;
}
.brand-name .x {
  color: var(--color-forest-mid);
}
[data-theme="dark"] .brand-name .x { color: var(--color-forest-bright); }
.brand-tagline {
  font-family: var(--font-sans);
  font-size: 0.65rem;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.02em;
  margin-top: 1px;
}

.topbar-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.topbar-date {
  font-family: var(--font-sans);
  font-size: 0.73rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}
.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: all 0.2s;
  font-size: 1rem;
}
.icon-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
.search-bar {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 6px 12px;
  transition: all 0.2s;
}
.search-bar:focus-within {
  border-color: var(--color-forest);
  box-shadow: 0 0 0 3px rgba(21,128,61,0.08);
}
.search-bar input {
  border: none; background: none; outline: none;
  font-family: var(--font-sans); font-size: 0.83rem;
  color: var(--text-primary);
  width: 140px;
  font-weight: 500;
}
.search-bar input::placeholder { color: var(--text-muted); font-weight: 400; }

/* ══════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════ */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr var(--right-width);
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px;
  gap: 20px;
  align-items: start;
}

.sidebar-left {
  position: sticky;
  top: 80px;
  padding: 20px 0;
}
.sidebar-left-title {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  padding: 0 8px;
  margin-bottom: 6px;
}
.category-list { display: flex; flex-direction: column; gap: 2px; }
.cat-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.18s;
  cursor: pointer;
  text-align: left;
  width: 100%;
  border: none;
  background: none;
}
.cat-tab:hover { background: var(--bg-secondary); color: var(--text-primary); }
.cat-tab.active {
  background: var(--color-forest);
  color: white;
  font-weight: 600;
}
.cat-tab .cat-icon { font-size: 1rem; flex-shrink: 0; }
.cat-tab .cat-name { flex: 1; text-align: left; }
.cat-tab .cat-count {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  background: rgba(0,0,0,0.08);
  padding: 1px 6px;
  border-radius: 5px;
  min-width: 24px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  opacity: 0.7;
}
.cat-tab.active .cat-count { background: rgba(255,255,255,0.25); opacity: 1; }

/* ══════════════════════════════════════════════════════
   MAIN CONTENT
   ══════════════════════════════════════════════════════ */
.main-content { padding: 20px 0; min-width: 0; }

.breaking-banner {
  background: var(--text-primary);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
}
.breaking-banner::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--color-forest), var(--color-amber), var(--color-red-hot));
}
.breaking-badge {
  background: var(--color-red-hot);
  color: white;
  font-family: var(--font-sans);
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  animation: blink-badge 1.5s ease-in-out infinite;
}
@keyframes blink-badge { 0%,100%{opacity:1} 50%{opacity:0.65} }
.breaking-text {
  font-family: var(--font-sans);
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--bg-card);
  line-height: 1.4;
}
.breaking-text a { color: inherit; }
.breaking-text a:hover { color: var(--color-amber); }

.section-label {
  font-family: var(--font-sans);
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.article-featured {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  margin-bottom: 14px;
  border: 1px solid var(--border);
  transition: all 0.25s;
}
.article-featured:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--color-forest);
}
.article-featured .article-img {
  height: 260px;
  overflow: hidden;
}
.article-featured .article-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s;
}
.article-featured:hover .article-img img { transform: scale(1.04); }
.article-featured .article-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.article-meta-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.category-tag {
  font-family: var(--font-sans);
  font-size: 0.67rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 3px 7px;
  border-radius: 4px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
}
.category-tag.food-safety { background: rgba(220,38,38,0.1); color: var(--color-red-hot); }
.category-tag.business { background: rgba(37,99,235,0.1); color: #2563eb; }
.category-tag.price { background: rgba(234,88,12,0.1); color: var(--color-amber); }
.category-tag.tech { background: rgba(124,58,237,0.1); color: #7c3aed; }
.category-tag.policy { background: rgba(8,145,178,0.1); color: #0891b2; }
.category-tag.health { background: rgba(21,128,61,0.1); color: var(--color-forest); }
.hot-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--color-red-hot);
  font-variant-numeric: tabular-nums;
}
.hot-meter { display: flex; align-items: center; gap: 2px; }
.hot-meter .bar { width: 3px; height: 10px; border-radius: 1px; background: var(--border); }
.hot-meter.on .bar:nth-child(1) { background: var(--color-amber); }
.hot-meter.on.mid .bar:nth-child(2) { background: var(--color-amber); }
.hot-meter.on.hot .bar:nth-child(2), .hot-meter.on.hot .bar:nth-child(3) { background: var(--color-red-hot); }
.hot-meter.on.fire .bar:nth-child(2), .hot-meter.on.fire .bar:nth-child(3), .hot-meter.on.fire .bar:nth-child(4) { background: var(--color-red-hot); }
.article-featured .article-title {
  font-family: var(--font-sans);
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.article-featured .article-title a:hover { color: var(--color-forest); }
.article-featured .article-summary {
  font-family: var(--font-sans);
  font-size: 0.87rem;
  line-height: 1.6;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 12px;
}
.article-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.article-source {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-sans);
  font-size: 0.77rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.article-source .source-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--color-forest);
}
.article-time {
  font-family: var(--font-sans);
  font-size: 0.73rem;
  color: var(--text-muted);
}
.read-btn {
  font-family: var(--font-sans);
  font-size: 0.73rem;
  font-weight: 600;
  color: var(--color-forest);
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--color-forest);
  transition: all 0.2s;
  margin-left: auto;
}
.read-btn:hover { background: var(--color-forest); color: white; }

.article-list { display: flex; flex-direction: column; gap: 8px; }
.article-card {
  display: flex;
  gap: 12px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 12px;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s;
  border: 1px solid var(--border);
  cursor: pointer;
}
.article-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--color-forest);
  transform: translateY(-1px);
}
.article-card .card-thumb {
  width: 100px; height: 76px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  flex-shrink: 0;
}
.article-card .card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}
.article-card:hover .card-thumb img { transform: scale(1.06); }
.article-card .card-body { flex: 1; min-width: 0; }
.article-card .card-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 5px;
}
.article-card .card-title {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  font-weight: 700;
  line-height: 1.35;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-card .card-title a:hover { color: var(--color-forest); }
.article-card .card-summary {
  font-family: var(--font-sans);
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-card .card-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}

.empty-state {
  text-align: center;
  padding: 36px 20px;
  background: var(--bg-card);
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  color: var(--text-muted);
}
.empty-state-icon { font-size: 2rem; margin-bottom: 8px; }
.empty-state-text {
  font-family: var(--font-sans);
  font-size: 0.88rem;
  font-weight: 500;
}

.load-more {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 20px;
}
.load-more-btn {
  font-family: var(--font-sans);
  font-size: 0.83rem;
  font-weight: 600;
  color: var(--color-forest);
  padding: 9px 24px;
  border: 1.5px solid var(--color-forest);
  border-radius: 9px;
  transition: all 0.2s;
}
.load-more-btn:hover { background: var(--color-forest); color: white; }

/* ══════════════════════════════════════════════════════
   RIGHT SIDEBAR
   ══════════════════════════════════════════════════════ */
.sidebar-right {
  position: sticky;
  top: 80px;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.sidebar-section {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.sidebar-section-title {
  font-family: var(--font-sans);
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-primary);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
}
.source-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.source-item:last-child { border-bottom: none; }
.source-info { display: flex; align-items: center; gap: 7px; }
.source-flag { font-size: 0.9rem; }
.source-name {
  font-family: var(--font-sans);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-primary);
}
.source-type {
  font-family: var(--font-sans);
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  padding: 1px 4px;
  border-radius: 3px;
}
.source-type.vn { background: rgba(220,38,38,0.1); color: #dc2626; }
.source-type.intl { background: rgba(37,99,235,0.1); color: #2563eb; }
.source-count {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-secondary);
  padding: 1px 6px;
  border-radius: 4px;
}
.trending-list { display: flex; flex-wrap: wrap; gap: 5px; }
.trend-tag {
  font-family: var(--font-sans);
  font-size: 0.76rem;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 7px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border: 1px solid transparent;
  transition: all 0.2s;
  cursor: pointer;
}
.trend-tag:hover, .trend-tag.active {
  background: var(--color-forest);
  color: white;
}
.trend-tag .tag-weight {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  opacity: 0.6;
  margin-left: 3px;
}
.cat-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 0;
}
.cat-row-label {
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 500;
  min-width: 85px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.cat-bar { flex: 1; height: 3px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 2px; }
.cat-count { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600; color: var(--text-muted); min-width: 22px; text-align: right; }

.footer {
  border-top: 1px solid var(--border);
  margin-top: 32px;
  padding: 20px;
  background: var(--bg-card);
}
.footer-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.footer-brand {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.footer-brand .x { color: var(--color-forest-mid); }
.footer-meta { font-family: var(--font-sans); font-size: 0.73rem; color: var(--text-muted); }
.footer-meta a { color: var(--color-forest); font-weight: 500; }
.footer-meta a:hover { text-decoration: underline; }

@media (max-width: 1100px) {
  :root { --right-width: 260px; --sidebar-width: 180px; }
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 160px 1fr; }
  .sidebar-right { display: none; }
}
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar-left { position: static; padding: 12px 0; }
  .category-list { flex-direction: row; flex-wrap: wrap; gap: 4px; }
  .cat-tab { width: auto; padding: 6px 10px; }
  .cat-tab .cat-name { display: none; }
  .cat-tab .cat-count { display: none; }
  .search-bar { display: none; }
  .brand-tagline { display: none; }
  .article-featured { grid-template-columns: 1fr; }
  .article-featured .article-img { height: 180px; }
}
@media (max-width: 500px) {
  .layout { padding: 0 12px; gap: 12px; }
  .topbar-inner { padding: 0 12px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

::-webkit-scrollbar { width: 6px; height: 6px; }

let activeCategory = 'tong-hop';

function getCategoryCount(slug) {
  if (slug === 'tong-hop') return articles.length;
  return articles.filter(a => a.category === slug).length;
}

function getFilteredArticles(slug) {
  if (slug === 'tong-hop') return [...articles].sort((a, b) => b.hotScore - a.hotScore);
  return articles.filter(a => a.category === slug).sort((a, b) => b.hotScore - a.hotScore);
}

function makeHotClass(score) {
  if (score >= 85) return 'fire';
  if (score >= 70) return 'hot';
  if (score >= 55) return 'mid';
  return '';
}

function makeBarsHTML(score) {
  const cls = makeHotClass(score);
  return `<span class="hot-meter on ${cls}"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></span>`;
}

function renderCategoryTabs() {
  document.getElementById('categoryList').innerHTML = categories.map(cat => {
    const count = getCategoryCount(cat.slug);
    const isActive = cat.slug === activeCategory ? 'active' : '';
    return `
      <button class="cat-tab ${isActive}" data-slug="${cat.slug}">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-count">${count}</span>
      </button>`;
  }).join('');

  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.slug;
      renderCategoryTabs();
      renderFeed();
    });
  });
}

function renderFeed() {
  const catObj = categories.find(c => c.slug === activeCategory);
  const filtered = getFilteredArticles(activeCategory);
  const featuredEl = document.getElementById('featuredContainer');
  const listEl = document.getElementById('articleList');
  const featLabel = document.getElementById('featuredLabel');
  const listLabel = document.getElementById('listLabel');
  const loadMoreWrap = document.getElementById('loadMoreWrap');

  const icons = { 'tong-hop':'🔥','kinh-doanh':'💼','an-toan-thuc-pham':'🛡️','gia-ca':'📊','cong-nghe':'⚡','quy-dinh':'📜','suc-khoe':'🥗','nong-nghiep':'🌾' };
  featLabel.textContent = `${icons[activeCategory] || '🔥'} ${catObj.name} nổi bật`;
  listLabel.textContent = `📋 Tin ${catObj.name.toLowerCase()}`;

  if (filtered.length === 0) {
    featuredEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">Chưa có tin nào trong "${catObj.name}"</div>
      </div>`;
    listEl.innerHTML = '';
    loadMoreWrap.style.display = 'none';
    return;
  }

  const f = filtered[0];
  featuredEl.innerHTML = `
    <article class="article-featured">
      <div class="article-img"><img src="${f.image}" alt="${f.title}"></div>
      <div class="article-body">
        <div>
          <div class="article-meta-top">
            <span class="category-tag ${f.catClass}">${f.catName}</span>
            <span class="hot-indicator"><span>🔥</span>${makeBarsHTML(f.hotScore)}<span>${f.hotScore.toFixed(1)}</span></span>
          </div>
          <h2 class="article-title"><a href="#">${f.title}</a></h2>
          <p class="article-summary">${f.summary}</p>
        </div>
        <div class="article-footer">
          <div class="article-source"><span class="source-dot"></span>${f.source}</div>
          <span class="article-time">${f.time}</span>
          <a href="#" class="read-btn">Đọc →</a>
        </div>
      </div>
    </article>`;

  const rest = filtered.slice(1);
  if (rest.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">Đã hiển thị tất cả tin trong danh mục này.</div>
      </div>`;
    loadMoreWrap.style.display = 'none';
    return;
  }

  listEl.innerHTML = rest.map(art => `
    <article class="article-card">
      <div class="card-thumb"><img src="${art.image}" alt="${art.title}" loading="lazy"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="category-tag ${art.catClass}">${art.catName}</span>
          ${art.isHot ? `<span class="hot-indicator"><span>🔥</span>${makeBarsHTML(art.hotScore)}<span>${art.hotScore.toFixed(1)}</span></span>` : ''}
        </div>
        <h3 class="card-title"><a href="#">${art.title}</a></h3>
        <p class="card-summary">${art.summary}</p>
        <div class="card-footer">
          <div class="article-source">
            <span class="source-dot" style="background:${art.country==='vn'?'#dc2626':'#2563eb'}"></span>${art.source}
          </div>
          <span class="article-time">${art.time}</span>
        </div>
      </div>
    </article>
  `).join('');

  loadMoreWrap.style.display = rest.length >= 3 ? 'flex' : 'none';
}

function renderSources() {
  document.getElementById('sourceList').innerHTML = sources.map(s => `
    <div class="source-item">
      <div class="source-info">
        <span class="source-flag">${s.flag}</span>
        <span class="source-name">${s.name}</span>
        <span class="source-type ${s.country}">${s.country==='vn'?'VN':'INTL'}</span>
      </div>
      <span class="source-count">${s.count}</span>
    </div>
  `).join('');
}

function renderTrends() {
  document.getElementById('trendingKeywords').innerHTML = trends.map(t => `
    <button class="trend-tag" data-kw="${t.keyword}">#${t.keyword} <span class="tag-weight">${t.weight}</span></button>
  `).join('');
  document.querySelectorAll('.trend-tag').forEach(tag => {
    tag.addEventListener('click', () => tag.classList.toggle('active'));
  });
}

function renderCategoryBreakdown() {
  const colors = ['#2563eb','#dc2626','#ea580c','#7c3aed','#0891b2','#16a34a','#c2410c','#65a30d'];
  const cats = categories.slice(1);
  const maxCount = Math.max(...cats.map(c => getCategoryCount(c.slug)));
  document.getElementById('categoryBreakdown').innerHTML = cats.map((c, i) => {
    const count = getCategoryCount(c.slug);
    const pct = maxCount > 0 ? (count / maxCount * 100).toFixed(0) : 0;
    return `
      <div class="cat-row">
        <span class="cat-row-label">${c.icon} ${c.name}</span>
        <div class="cat-bar"><div class="cat-bar-fill" style="width:${pct}%;background:${colors[i]}"></div></div>
        <span class="cat-count">${count}</span>
      </div>`;
  }).join('');
}

function initTheme() {
  const t = document.getElementById('themeToggle');
  if (localStorage.getItem('fx-theme') === 'dark') {
    document.documentElement.setAttribute('data-theme','dark');
    t.textContent = '☀️';
  }
  t.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    t.textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('fx-theme', next);
  });
}

function initDate() {
  document.getElementById('currentDate').textContent = new Date().toLocaleDateString('vi-VN', {

}

function initBreaking() {
  const hot = [...articles].sort((a,b) => b.hotScore - a.hotScore)[0];
  if (hot) {
    document.getElementById('breakingText').innerHTML =
      `<a href="#">${hot.title}</a> · ${hot.source} · ${hot.time}`;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  renderCategoryTabs();
  renderFeed();
  renderSources();
  renderTrends();
  renderCategoryBreakdown();
  initTheme();
  initDate();
  initBreaking();
});
</script>
</body>
</html>
